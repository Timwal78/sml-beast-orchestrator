name: BB7 Alerts Sweep

on:
  schedule:
    # Every 15 minutes — catches kill switch transitions and review backlog
    # growth between agent cycles. Cheap (no XRPL, no SMTP, no IMAP).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: bb7-alerts-sweep
  cancel-in-progress: true

jobs:
  sweep:
    name: Run alert sweep
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[bb7]"

      - name: Sweep + emit any alerts
        env:
          BEAST_OUTPUT_ROOT: ${{ secrets.BEAST_OUTPUT_ROOT }}
          BB7_DISCORD_ALERT_WEBHOOK: ${{ secrets.BB7_DISCORD_ALERT_WEBHOOK }}
        run: python -m sml_beast.outreach.opctl alerts-sweep
