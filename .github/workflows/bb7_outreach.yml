name: BB7 Outreach Agent

on:
  schedule:
    # Weekdays at 10:00 UTC — after IP warmup window is established
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no XRPL or SMTP)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: bb7-outreach
  cancel-in-progress: false  # never cancel an in-flight pitch cycle

jobs:
  outreach:
    name: Run outreach cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[bb7]"

      - name: Trigger Webhook
        env:
          DASHBOARD_AUTH_TOKEN: ${{ secrets.DASHBOARD_AUTH_TOKEN }}
        run: |
          curl -X POST https://sml-beast-orchestrator.onrender.com/api/run-cycle \
            -H "Authorization: Bearer $DASHBOARD_AUTH_TOKEN" \
            --fail-with-body
