name: BB7 Outreach Agent

on:
  schedule:
    # Weekdays at 10:00 UTC — after IP warmup window is established
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no XRPL or SMTP)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: bb7-outreach
  cancel-in-progress: false  # never cancel an in-flight pitch cycle

jobs:
  outreach:
    name: Run outreach cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[bb7]"

      - name: Trigger Webhook
        env:
          DASHBOARD_AUTH_TOKEN: ${{ secrets.DASHBOARD_AUTH_TOKEN }}
        run: |
          curl -X POST https://sml-beast-orchestrator.onrender.com/api/run-cycle \
            -H "Authorization: Bearer $DASHBOARD_AUTH_TOKEN" \
            --fail-with-body
