name: BB7 Outreach Agent

on:
  schedule:
    # Weekdays at 10:00 UTC — after IP warmup window is established
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no XRPL or SMTP)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: bb7-outreach
  cancel-in-progress: false  # never cancel an in-flight pitch cycle

jobs:
  outreach:
    name: Run outreach cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[bb7]"

      - name: Run outreach cycle
        env:
          BEAST_OUTPUT_ROOT: ${{ secrets.BEAST_OUTPUT_ROOT }}
          BB7_XRPL_WALLET_SEED: ${{ secrets.BB7_XRPL_WALLET_SEED }}
          BB7_XRPL_NETWORK: ${{ secrets.BB7_XRPL_NETWORK }}
          BB7_XRP_PRICE_USDC: ${{ secrets.BB7_XRP_PRICE_USDC }}
          BB7_SMTP_HOST: ${{ secrets.BB7_SMTP_HOST }}
          BB7_SMTP_USER: ${{ secrets.BB7_SMTP_USER }}
          BB7_SMTP_PASS: ${{ secrets.BB7_SMTP_PASS }}
          BB7_SMTP_FROM: ${{ secrets.BB7_SMTP_FROM }}
          BB7_OPT_OUT_URL: ${{ secrets.BB7_OPT_OUT_URL }}
          BB7_OPERATOR_ADDRESS: ${{ secrets.BB7_OPERATOR_ADDRESS }}
          BB7_OPERATOR_SIGNATURE: ${{ secrets.BB7_OPERATOR_SIGNATURE }}
          BB7_OUTREACH_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -m sml_beast.outreach.agent
