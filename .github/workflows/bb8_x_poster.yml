name: BB8 Social Broadcaster

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 14 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      vertical:
        description: 'Vertical to post about'
        required: true
        type: choice
        options:
          - mcp-x402
          - mastersheets
          - xdeo
        default: mcp-x402
      dry_run:
        description: 'Dry run (no actual posting)'
        required: false
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[bb7]"
      - name: Run Auto-Poster
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date +%H)
            if [ "$HOUR" = "14" ]; then
              VERTICAL="mcp-x402"
            elif [ "$HOUR" = "18" ]; then
              VERTICAL="xdeo"
            else
              VERTICAL="mastersheets"
            fi
            bb7 x-post $VERTICAL
          else
            DRY="${{ github.event.inputs.dry_run }}"
            VERT="${{ github.event.inputs.vertical }}"
            if [ "$DRY" = "true" ]; then
              bb7 x-post $VERT --dry-run
            else
              bb7 x-post $VERT
            fi
          fi