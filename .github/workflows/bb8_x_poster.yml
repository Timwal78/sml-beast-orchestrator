name: BB8 Social Broadcaster

on:
  schedule:
    - cron: '0 10,18 * * *' # Run at 10:00 and 18:00 UTC
  workflow_dispatch:
    inputs:
      vertical:
        description: 'Vertical to post about'
        required: true
        type: choice
        options:
          - mastersheets
          - xdeo
        default: mastersheets
      dry_run:
        description: 'Dry run (no actual posting)'
        required: false
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[bb7]"

      - name: Run Auto-Poster
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          # If triggered by schedule, default to a random vertical or alternate based on hour
          VERTICAL="mastersheets"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date +%H)
            if [ "$HOUR" = "18" ]; then
              VERTICAL="xdeo"
            fi
            bb7 x-post $VERTICAL
          else
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              bb7 x-post ${{ github.event.inputs.vertical }} --dry-run
            else
              bb7 x-post ${{ github.event.inputs.vertical }}
            fi
          fi
