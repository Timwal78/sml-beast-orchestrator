name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on rapid pushes — saves Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default; specific jobs widen scope when needed.
permissions:
  contents: read

jobs:

  # ── lint + format check ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff check
        run: ruff check sml_beast tests
      - name: ruff format --check
        run: ruff format --check sml_beast tests

  # ── type check ──────────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install with dev + bb7 extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bb7]"
      - name: mypy
        # Invoked via `python -m mypy` so the installed type stubs
        # (types-requests, etc.) resolve through the same sys.path as
        # the rest of the env.
        run: python -m mypy sml_beast

  # ── unit tests (matrix across 3.11 + 3.12) ──────────────────────────────
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      # Test isolation — these dummy values satisfy the orchestrator's
      # required-env guards without exposing anything real. The proxy
      # never makes outbound calls in unit-test mode.
      SERPER_API_KEY: ci-dummy-key
      X402_PROXY_SECRET: ci-dummy-secret-not-used-in-real-deploys
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install runtime + bb7 extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[bb7]"
      - name: Run test suite
        run: python -m unittest discover -s tests -v

  # ── security audit ──────────────────────────────────────────────────────
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install with dev extras for pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bb7]"
      - name: pip-audit (advisory; do not fail build on findings)
        # Findings surface as a job annotation; we don't block merges on
        # transitive CVEs we can't immediately fix. Operator reviews
        # weekly via Dependabot security alerts.
        continue-on-error: true
        run: pip-audit
